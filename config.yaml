camera:
  sensor_id: 0
  width: 1280
  height: 720
  framerate: 30
  flip_method: 0

face_mesh:
  max_faces: 1
  refine_landmarks: true

ear:
  threshold: 0.21        # eye aspect ratio below this = closed
  consecutive_frames: 3  # frames below threshold to count a blink

head_pose:
  yaw_threshold: 30      # degrees left/right before "distracted"
  pitch_threshold: 20    # degrees up/down before "distracted"

state:
  perclos_window_sec: 60   # rolling window for PERCLOS calculation
  drowsy_perclos: 0.20     # PERCLOS >= 20% triggers drowsy alert

display:
  window_title: "DMS - Driver Monitoring System"
  show_fps: true
